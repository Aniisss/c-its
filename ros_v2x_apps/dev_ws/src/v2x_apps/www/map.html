<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LDM Live Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@5.6.1/dist/maplibre-gl.js"></script>
    <style>
      html, body, #map { margin: 0; height: 100%; width: 100%; }
      .vehicle-marker { width: 30px; height: 30px; transform-origin: center center; }
    </style>
  </head>
  <body class="bg-slate-900">
    <div id="map"></div>
    <div class="absolute top-3 left-3 rounded-md bg-white/90 px-3 py-2 text-sm shadow">
      <div class="font-semibold">LDM Live</div>
      <div id="status" class="text-slate-600">Connecting…</div>
    </div>

    <script>
      const map = new maplibregl.Map({
        container: 'map',
        style: {
          version: 8,
          sources: {
            osm: {
              type: 'raster',
              tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
              tileSize: 256,
              attribution: '© OpenStreetMap contributors'
            }
          },
          layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
        },
        center: [4.35, 50.85],
        zoom: 13
      });

      map.addControl(new maplibregl.NavigationControl(), 'top-right');

      const vehicleEl = document.createElement('div');
      vehicleEl.className = 'vehicle-marker';
      vehicleEl.innerHTML = `
        <svg viewBox="0 0 64 64" width="30" height="30" aria-hidden="true">
          <path d="M32 4 L56 56 L32 44 L8 56 Z" fill="#0f766e" stroke="#042f2e" stroke-width="3"></path>
        </svg>
      `;
      const vehicleMarker = new maplibregl.Marker({ element: vehicleEl }).setLngLat([4.35, 50.85]);
      let vehicleVisible = false;

      const emptyFC = { type: 'FeatureCollection', features: [] };
      map.on('load', () => {
        map.addSource('parking', { type: 'geojson', data: emptyFC });
        map.addLayer({
          id: 'parking-circles',
          type: 'circle',
          source: 'parking',
          paint: {
            'circle-radius': 10,
            'circle-stroke-width': 1,
            'circle-stroke-color': '#111827',
            'circle-color': [
              'interpolate', ['linear'], ['coalesce', ['get', 'occupancy'], 0],
              0, '#16a34a',
              100, '#dc2626'
            ]
          }
        });

        map.addLayer({
          id: 'parking-labels',
          type: 'symbol',
          source: 'parking',
          layout: {
            'text-field': ['concat', ['get', 'name'], ' ', ['to-string', ['round', ['coalesce', ['get', 'occupancy'], 0]]], '%'],
            'text-offset': [0, 1.2],
            'text-size': 12
          },
          paint: {
            'text-color': '#0f172a',
            'text-halo-color': '#ffffff',
            'text-halo-width': 1
          }
        });
      });

      function updateMap(data) {
        const features = Array.isArray(data?.features) ? data.features : [];
        const parkingFeatures = features.filter(f => f?.properties?.type === 'parking');
        const vehicleFeature = features.find(f => f?.properties?.type === 'vehicle');

        const parkingSource = map.getSource('parking');
        if (parkingSource) {
          parkingSource.setData({ type: 'FeatureCollection', features: parkingFeatures });
        }

        if (vehicleFeature?.geometry?.coordinates?.length === 2) {
          const [lng, lat] = vehicleFeature.geometry.coordinates;
          const heading = Number(vehicleFeature.properties?.heading ?? 0);
          vehicleEl.style.transform = `rotate(${heading}deg)`;
          vehicleMarker.setLngLat([lng, lat]);
          if (!vehicleVisible) {
            vehicleMarker.addTo(map);
            vehicleVisible = true;
          }
        }
      }

      async function pollLdm() {
        const status = document.getElementById('status');
        try {
          const res = await fetch('/ldm/geojson', { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const geojson = await res.json();
          updateMap(geojson);
          status.textContent = `Connected • ${new Date().toLocaleTimeString()}`;
          status.className = 'text-emerald-700';
        } catch (err) {
          status.textContent = `Disconnected • ${err.message}`;
          status.className = 'text-red-700';
        }
      }

      setInterval(pollLdm, 500);
      pollLdm();
    </script>
  </body>
</html>
